name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag is on master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/master; then
            echo "Refusing to publish: tag must be on the master branch"
            exit 1
          fi

      - name: Ensure tag matches package version
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(grep -Po '(?<=^version = ")[^"]+' pyproject.toml)
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Refusing to publish: tag version ($tag_version) does not match pyproject.toml version ($pkg_version)"
            exit 1
          fi
          echo "Tag version ($tag_version) matches pyproject.toml version ($pkg_version)"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build
        run: uv build

      - name: Check metadata
        run: uv run --with twine twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.IHELA_PYPI_TOKEN }}
